name: iosApp
options:
  bundleIdPrefix: com.sutec
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    ONLY_ACTIVE_ARCH: YES
    SWIFT_VERSION: "5.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    # Compose Multiplatform(iOS) は起動時に CADisableMinimumFrameDurationOnPhone を要求するため
    # 自動生成でなく明示 Info.plist を用いる。
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: SUT Store
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        CADisableMinimumFrameDurationOnPhone: true
        UIApplicationSupportsIndirectInputEvents: true
        # ローカル画像サーバー(http://127.0.0.1:8000)からの平文取得を許可(モック用)。
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sutec.mobile
        PRODUCT_NAME: iosApp
        # Kotlin フレームワークは gradle が xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME) に生成。
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - ComposeApp
        # gradle の Run Script がサンドボックス下で書き込むため無効化。
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
